<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meme Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>The Meme Factory</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌓</button>
    </header>

    <main>
        <section class="controls-section">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for memes..." aria-label="Search for memes">
            </div>
            <div class="filter-sort-container">
                <select id="filter-select" aria-label="Filter by complexity">
                    <option value="all">All Memes</option>
                    <option value="2">2 Text Boxes</option>
                    <option value="3+">3+ Text Boxes</option>
                </select>
                <select id="sort-select" aria-label="Sort memes">
                    <option value="default">Default Order</option>
                    <option value="asc">Name (A-Z)</option>
                    <option value="desc">Name (Z-A)</option>
                </select>
            </div>
        </section>

        <div id="loading" class="loading-indicator">
            <p>Loading memes...</p>
        </div>

        <div id="meme-container">
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
